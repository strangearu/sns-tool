<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請求書を作る — あやね マネージャーHub</title>
<style>
  :root { --blue:#2255AA; --blue-l:#eaf0fa; --bg:#f4f5f7; --card:#fff; --text:#1a1d24; --sub:#6b7280; --border:#e2e4e9; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family:"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif; background:var(--bg); color:var(--text); padding:18px 14px 60px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  .back { color: var(--blue); text-decoration: none; font-weight: 700; font-size: 13px; }
  h1 { font-size: 20px; margin: 10px 0 4px; }
  .lead { color: var(--sub); font-size: 12.5px; margin-bottom: 16px; }

  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
  .panel h2 { font-size: 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .panel h2 .tag { font-size: 10.5px; font-weight: 700; color: #fff; background: var(--blue); border-radius: 99px; padding: 2px 9px; }
  .panel h2 .tag.safe { background: #16a34a; }

  label { display: block; font-size: 12px; font-weight: 700; color: var(--sub); margin: 10px 0 4px; }
  input, textarea, select { width: 100%; border: 1px solid var(--border); border-radius: 9px; padding: 10px 11px; font-size: 14px; font-family: inherit; background: #fafbfc; }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--blue); outline-offset: -1px; background: #fff; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 520px) { .grid2 { grid-template-columns: 1fr; } }

  button { border: none; border-radius: 10px; padding: 11px 18px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-blue { background: var(--blue); color: #fff; }
  .btn-sub { background: #eef1f5; color: var(--text); }
  .btn-line { background: #fff; color: var(--blue); border: 1px solid var(--blue); }

  /* 品目テーブル */
  .items { width: 100%; border-collapse: collapse; margin-top: 6px; }
  .items th { font-size: 11px; color: var(--sub); text-align: left; padding: 4px 4px; }
  .items td { padding: 3px 4px; vertical-align: top; }
  .items input { padding: 8px 9px; font-size: 13px; }
  .items .del { background: #fde8e8; color: #c0392b; border-radius: 8px; padding: 8px 10px; font-weight: 800; }
  .items .num { text-align: right; }

  .row-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }

  /* ===== 請求書プレビュー（印刷対象） ===== */
  .doc-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 6px; border-radius: 10px; }
  #doc { background: #fff; color: #111; border: 1px solid var(--border); border-radius: 10px; padding: 30px; min-width: 580px; }
  .doc-title { background: var(--blue); color: #fff; font-size: 22px; font-weight: 800; letter-spacing: .3em; text-align: center; padding: 12px; border-radius: 6px; }
  .doc-top { display: flex; justify-content: space-between; gap: 20px; margin-top: 22px; }
  .doc-to { flex: 1; }
  .doc-to .to-name { font-size: 18px; font-weight: 800; border-bottom: 2px solid #111; padding-bottom: 6px; display: inline-block; min-width: 180px; }
  .doc-to .subj { margin-top: 16px; font-size: 13px; }
  .doc-to .subj b { display: block; color: var(--sub); font-size: 11px; margin-bottom: 2px; }
  .doc-from { font-size: 12px; line-height: 1.7; text-align: right; min-width: 220px; }
  .doc-from .fn { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
  .doc-meta { font-size: 11.5px; color: #555; text-align: right; margin-top: 4px; }
  .amount-box { border: 2px solid var(--blue); border-radius: 8px; margin: 22px 0; overflow: hidden; }
  .amount-box .al { background: var(--blue); color: #fff; font-weight: 800; padding: 8px 14px; font-size: 13px; }
  .amount-box .av { padding: 12px 14px; font-size: 26px; font-weight: 900; text-align: right; }
  table.bill { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
  table.bill th { background: var(--blue); color: #fff; padding: 9px 10px; text-align: left; font-weight: 700; }
  table.bill th.r, table.bill td.r { text-align: right; }
  table.bill td { padding: 9px 10px; border-bottom: 1px solid #e5e7eb; }
  .totals { margin-top: 12px; margin-left: auto; width: 280px; font-size: 13px; }
  .totals .tr { display: flex; justify-content: space-between; padding: 6px 4px; }
  .totals .tr.grand { border-top: 2px solid var(--blue); font-weight: 900; font-size: 16px; color: var(--blue); margin-top: 4px; padding-top: 10px; }
  .bank { border: 1px solid var(--blue); border-radius: 8px; margin-top: 22px; overflow: hidden; }
  .bank .bl { background: var(--blue-l); color: var(--blue); font-weight: 800; padding: 7px 12px; font-size: 12px; }
  .bank .bv { padding: 11px 12px; font-size: 13px; line-height: 1.6; }
  .note-sec { margin-top: 18px; }
  .note-sec .nl { background: var(--blue); color: #fff; font-weight: 700; padding: 6px 12px; font-size: 12px; border-radius: 5px 5px 0 0; }
  .note-sec .nv { border: 1px solid var(--border); border-top: none; padding: 11px 12px; font-size: 12.5px; line-height: 1.7; white-space: pre-wrap; min-height: 30px; }

  .hint { font-size: 11.5px; color: var(--sub); line-height: 1.6; margin-top: 8px; }
  .save-status { font-size: 12px; color: #16a34a; font-weight: 700; margin-left: 8px; }

  @media print {
    body { background: #fff; padding: 0; }
    .noprint { display: none !important; }
    .doc-scroll { overflow: visible; }
    #doc { border: none; border-radius: 0; margin: 0; padding: 16px; min-width: 0; }
    .wrap { max-width: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="noprint">
    <a class="back" href="index.html">← マネージャーHubに戻る</a>
    <h1>🧾 請求書を作る</h1>
    <p class="lead">宛先と品目を入れるだけ。あなたの情報は<b>この端末の中だけ</b>に保存され、公開サイトには残りません。</p>

    <!-- 発行者情報（端末内保存） -->
    <details class="panel" id="issuer-panel">
      <summary style="cursor:pointer;font-weight:800;font-size:14px;list-style:none;display:flex;align-items:center;gap:8px">
        👤 あなたの情報（発行者）<span class="tag safe" style="font-size:10.5px;color:#fff;background:#16a34a;border-radius:99px;padding:2px 9px">端末内保存</span>
        <span id="issuer-state" style="margin-left:auto;font-size:11.5px;color:#6b7280;font-weight:600"></span>
      </summary>
      <div style="margin-top:12px">
        <p class="hint">一度入力して「保存」すれば次回から自動で入ります（このスマホ/PCの中だけ・公開されません）。</p>
        <label>氏名</label><input id="i-name" placeholder="例：山田花子">
        <div class="grid2">
          <div><label>郵便番号</label><input id="i-zip" placeholder="〒000-0000"></div>
          <div><label>電話</label><input id="i-tel" placeholder="090-0000-0000"></div>
        </div>
        <label>住所</label><input id="i-addr" placeholder="東京都〇〇区…">
        <label>メール</label><input id="i-mail" placeholder="example@gmail.com">
        <label>インボイス登録番号</label><input id="i-invoice" placeholder="T0000000000000">
        <label>振込先</label><input id="i-bank" placeholder="〇〇銀行 〇〇支店 普通 0000000 ナマエ">
        <div style="margin-top:12px"><button class="btn-blue" id="save-issuer">保存</button><span class="save-status" id="issuer-saved"></span></div>
      </div>
    </details>

    <!-- 請求内容 -->
    <div class="panel">
      <h2>📝 請求内容</h2>
      <div class="grid2">
        <div><label>宛先（クライアント名）</label><input id="c-to" placeholder="株式会社○○"></div>
        <div><label>敬称</label><select id="c-honor"><option>御中</option><option>様</option></select></div>
      </div>
      <label>件名</label><input id="c-subject" placeholder="○○イベント出演料">
      <div class="grid2">
        <div><label>発行日</label><input type="date" id="c-date"></div>
        <div><label>お支払期限</label><input type="date" id="c-due"></div>
      </div>
      <label>請求書番号（任意）</label><input id="c-no" placeholder="例: 2026-0001">

      <label style="margin-top:16px">品目</label>
      <table class="items">
        <thead><tr><th style="width:46%">品名</th><th style="width:14%">数量</th><th style="width:20%">単価</th><th style="width:12%">税率</th><th></th></tr></thead>
        <tbody id="item-rows"></tbody>
      </table>
      <div class="row-actions">
        <button class="btn-sub" id="add-item">＋ 品目を追加</button>
      </div>

      <label style="margin-top:16px">備考</label>
      <textarea id="c-note" rows="2" placeholder="交通費は実費。お振込手数料はご負担ください 等"></textarea>

      <div class="row-actions">
        <button class="btn-blue" id="gen">🔄 プレビューを更新</button>
        <button class="btn-line" id="print">🖨 PDFにする（印刷）</button>
      </div>
      <p class="hint">📄 「PDFにする」を押すと印刷画面が出ます。送信先を「PDFとして保存」にすればPDFができます（iPhoneは共有→ファイルに保存）。</p>
    </div>

    <div class="sec-title" style="font-size:13px;font-weight:800;color:#6b7280;margin:18px 4px 8px">プレビュー ↓</div>
  </div>

  <!-- 印刷対象の請求書 -->
  <div class="doc-scroll"><div id="doc"></div></div>
</div>

<script>
  const $ = id => document.getElementById(id);
  const ISSUER_FIELDS = ["name","zip","tel","addr","mail","invoice","bank"];

  // ---- 発行者情報 load/save ----
  function loadIssuer() {
    const data = JSON.parse(localStorage.getItem("invoice-issuer") || "{}");
    ISSUER_FIELDS.forEach(f => { if (data[f] != null) $("i-" + f).value = data[f]; });
    $("issuer-state").textContent = data.name ? "✅ " + data.name : "未設定（先に入力してください）";
    if (!data.name) $("issuer-panel").open = true;
    return data;
  }
  $("save-issuer").addEventListener("click", () => {
    const data = {};
    ISSUER_FIELDS.forEach(f => data[f] = $("i-" + f).value.trim());
    localStorage.setItem("invoice-issuer", JSON.stringify(data));
    $("issuer-saved").textContent = "保存しました ✅";
    $("issuer-state").textContent = data.name ? "✅ " + data.name : "未設定";
    setTimeout(() => $("issuer-saved").textContent = "", 2000);
    render();
  });

  // ---- 品目 ----
  function addItem(name = "", qty = "1", price = "", rate = "10%") {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><input class="it-name" value="${name}" placeholder="出演料"></td>
      <td><input class="it-qty num" inputmode="decimal" value="${qty}"></td>
      <td><input class="it-price num" inputmode="numeric" value="${price}" placeholder="50000"></td>
      <td><select class="it-rate"><option>10%</option><option>8%</option><option>非課税</option></select></td>
      <td><button class="del">×</button></td>`;
    tr.querySelector(".it-rate").value = rate;
    tr.querySelector(".del").addEventListener("click", () => { tr.remove(); render(); });
    tr.querySelectorAll("input,select").forEach(el => el.addEventListener("input", render));
    $("item-rows").appendChild(tr);
  }
  $("add-item").addEventListener("click", () => { addItem(); render(); });

  // ---- 日付初期値 ----
  function fmtDate(d) { return d.toISOString().slice(0, 10); }
  function endOfNextMonth() {
    const d = new Date();
    return new Date(d.getFullYear(), d.getMonth() + 2, 0);
  }
  function jpDate(s) {
    if (!s) return "";
    const [y, m, d] = s.split("-");
    return `${y}年${parseInt(m)}月${parseInt(d)}日`;
  }
  function yen(n) { return "¥" + (n || 0).toLocaleString("ja-JP"); }

  // ---- プレビュー生成 ----
  function render() {
    const issuer = JSON.parse(localStorage.getItem("invoice-issuer") || "{}");
    const rows = [...document.querySelectorAll("#item-rows tr")].map(tr => ({
      name: tr.querySelector(".it-name").value,
      qty: parseFloat(tr.querySelector(".it-qty").value) || 0,
      price: parseFloat(tr.querySelector(".it-price").value) || 0,
      rate: tr.querySelector(".it-rate").value,
    }));

    let sub10 = 0, sub8 = 0, subEx = 0;
    rows.forEach(r => {
      const amt = r.qty * r.price;
      if (r.rate === "10%") sub10 += amt;
      else if (r.rate === "8%") sub8 += amt;
      else subEx += amt;
    });
    const tax10 = Math.floor(sub10 * 0.1);
    const tax8 = Math.floor(sub8 * 0.08);
    const subtotal = sub10 + sub8 + subEx;
    const total = subtotal + tax10 + tax8;

    const toName = ($("c-to").value || "（宛先）") + " " + $("c-honor").value;
    const itemsHtml = rows.map(r => `
      <tr><td>${r.name || "—"}</td><td class="r">${r.qty}</td><td class="r">${yen(r.price)}</td>
      <td class="r">${r.rate}</td><td class="r">${yen(r.qty * r.price)}</td></tr>`).join("");

    let taxBreak = "";
    if (sub10) taxBreak += `<div class="tr"><span>10%対象 ${yen(sub10)} / 消費税</span><span>${yen(tax10)}</span></div>`;
    if (sub8) taxBreak += `<div class="tr"><span>8%対象 ${yen(sub8)} / 消費税</span><span>${yen(tax8)}</span></div>`;
    if (subEx) taxBreak += `<div class="tr"><span>非課税</span><span>${yen(subEx)}</span></div>`;

    $("doc").innerHTML = `
      <div class="doc-title">請求書</div>
      <div class="doc-top">
        <div class="doc-to">
          <span class="to-name">${toName}</span>
          ${$("c-subject").value ? `<div class="subj"><b>件名</b>${$("c-subject").value}</div>` : ""}
        </div>
        <div class="doc-from">
          <div class="fn">${issuer.name || "（発行者名）"}</div>
          ${issuer.zip ? issuer.zip + "<br>" : ""}${issuer.addr ? issuer.addr + "<br>" : ""}
          ${issuer.tel ? "TEL: " + issuer.tel + "<br>" : ""}${issuer.mail ? issuer.mail + "<br>" : ""}
          ${issuer.invoice ? "登録番号: " + issuer.invoice : ""}
        </div>
      </div>
      <div class="doc-meta">
        ${$("c-no").value ? "請求書番号: " + $("c-no").value + "　" : ""}
        発行日: ${jpDate($("c-date").value) || "—"}　お支払期限: ${jpDate($("c-due").value) || "—"}
      </div>
      <div class="amount-box">
        <div class="al">ご請求金額</div>
        <div class="av">${yen(total)} <span style="font-size:13px;font-weight:600">(税込)</span></div>
      </div>
      <table class="bill">
        <thead><tr><th>品目</th><th class="r">数量</th><th class="r">単価</th><th class="r">税率</th><th class="r">金額</th></tr></thead>
        <tbody>${itemsHtml || '<tr><td colspan="5">（品目を入力してください）</td></tr>'}</tbody>
      </table>
      <div class="totals">
        <div class="tr"><span>小計</span><span>${yen(subtotal)}</span></div>
        ${taxBreak}
        <div class="tr grand"><span>合計</span><span>${yen(total)}</span></div>
      </div>
      <div class="bank">
        <div class="bl">お振込先</div>
        <div class="bv">${issuer.bank || "（振込先を設定してください）"}</div>
      </div>
      ${$("c-note").value ? `<div class="note-sec"><div class="nl">備考</div><div class="nv">${$("c-note").value}</div></div>` : ""}
    `;
  }

  $("gen").addEventListener("click", render);
  $("print").addEventListener("click", () => { render(); setTimeout(() => window.print(), 100); });
  ["c-to","c-honor","c-subject","c-date","c-due","c-no","c-note"].forEach(id =>
    $(id).addEventListener("input", render));

  // ---- 初期化 ----
  loadIssuer();
  $("c-date").value = fmtDate(new Date());
  $("c-due").value = fmtDate(endOfNextMonth());
  addItem("出演料", "1", "");
  render();
</script>
</body>
</html>
