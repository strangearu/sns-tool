<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<title>定例レポート</title>
<script>(function(){var t=localStorage.getItem("hub-theme");if(t==="light"||t==="dark")document.documentElement.dataset.theme=t;})();</script>
<style>
  :root {
    --bg:#f7f8fc; --card:#ffffff; --card2:#f3f5fb;
    --text:#23283a; --sub:#737a8c; --line:#e7e9f1;
    --accent:#ff2d55; --accent2:#e11d48; --gold:#c4860a; --ok:#16a34a;
    --shadow:0 2px 10px rgba(31,41,80,.06);
  }

  /* ==== Apple統一テーマ（2026-07-22・ハブと共通。外観=ハブの設定に連動） ==== */
  :root {
    --bg:#f2f2f7; --card:rgba(255,255,255,.8); --card-solid:#ffffff; --card2:rgba(120,120,128,.08);
    --text:#1d1d1f; --sub:#86868b; --border:rgba(60,60,67,.15); --line:rgba(60,60,67,.15);
    --accent:#0071e3; --accent-d:#0059b3; --accent2:#0059b3; --tint:rgba(0,113,227,.09);
    --glass-edge:rgba(255,255,255,.55);
    --blobA:rgba(0,113,227,.12); --blobB:rgba(175,82,222,.10); --blobC:rgba(0,199,190,.09);
    --shadow:0 1px 2px rgba(0,0,0,.03), 0 6px 18px rgba(30,40,60,.06);
  }
  @media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) {
    --bg:#000000; --card:rgba(28,28,30,.72); --card-solid:#1c1c1e; --card2:rgba(120,120,128,.16);
    --text:#f5f5f7; --sub:#98989d; --border:rgba(84,84,88,.45); --line:rgba(84,84,88,.45);
    --accent:#2997ff; --accent-d:#64b2ff; --accent2:#64b2ff; --tint:rgba(41,151,255,.13);
    --glass-edge:rgba(255,255,255,.09);
    --blobA:rgba(10,110,230,.2); --blobB:rgba(150,70,220,.15); --blobC:rgba(0,160,170,.12);
    --shadow:0 1px 2px rgba(0,0,0,.4);
  } }
  :root[data-theme="dark"] {
    --bg:#000000; --card:rgba(28,28,30,.72); --card-solid:#1c1c1e; --card2:rgba(120,120,128,.16);
    --text:#f5f5f7; --sub:#98989d; --border:rgba(84,84,88,.45); --line:rgba(84,84,88,.45);
    --accent:#2997ff; --accent-d:#64b2ff; --accent2:#64b2ff; --tint:rgba(41,151,255,.13);
    --glass-edge:rgba(255,255,255,.09);
    --blobA:rgba(10,110,230,.2); --blobB:rgba(150,70,220,.15); --blobC:rgba(0,160,170,.12);
    --shadow:0 1px 2px rgba(0,0,0,.4);
  }
  body::before { content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(560px 380px at 88% -6%, var(--blobA), transparent 65%),
      radial-gradient(640px 470px at -14% 22%, var(--blobB), transparent 65%),
      radial-gradient(540px 430px at 55% 108%, var(--blobC), transparent 65%),
      var(--bg); }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro JP","Helvetica Neue","Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;
    background: radial-gradient(1100px 560px at 50% -180px, #ffe7ee 0%, var(--bg) 50%);
    background-attachment:fixed; color:var(--text); min-height:100vh; padding-bottom:40px;
  }
  .wrap { max-width:620px; margin:0 auto; padding:16px 14px 30px; }
  .top { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .back { text-decoration:none; color:var(--sub); font-size:13px; font-weight:700; }
  .ph { text-align:center; padding:6px 0 12px; }
  .ph .brand { display:inline-block; font-size:10.5px; letter-spacing:.2em; font-weight:800; color:var(--accent2);
    border:1px solid var(--accent); border-radius:99px; padding:4px 12px; margin-bottom:9px; text-transform:uppercase; }
  .ph h1 { font-size:22px; font-weight:900; }
  .ph p { color:var(--sub); font-size:12px; margin-top:5px; }

  .tabs { display:flex; gap:8px; justify-content:center; margin-bottom:14px; }
  .tabs button { border:1px solid var(--line); background:var(--card); border-radius:99px; padding:8px 18px;
    font-size:12.5px; font-weight:800; color:var(--sub); cursor:pointer; font-family:inherit; box-shadow:var(--shadow); }
  .tabs button.on { border-color:var(--accent); background:var(--tint); color:var(--accent); }

  .status { font-size:12.5px; color:var(--sub); text-align:center; margin:14px 0; line-height:1.7; }

  .rep { background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); margin-bottom:12px; overflow:hidden; }
  .rep summary { list-style:none; cursor:pointer; padding:14px 16px; display:flex; align-items:center; gap:10px; }
  .rep summary::-webkit-details-marker { display:none; }
  .rep .tag { flex:none; font-size:10px; font-weight:800; color:#fff; border-radius:99px; padding:3px 9px; }
  .rep .tag.weekly { background:var(--accent); }
  .rep .tag.monthly { background:var(--gold); }
  .rep .rt { font-weight:800; font-size:14px; flex:1; min-width:0; }
  .rep .rd { font-size:11px; color:var(--sub); flex:none; }
  .rep .arrow { color:var(--sub); font-size:12px; transition:transform .2s; flex:none; }
  .rep[open] .arrow { transform:rotate(90deg); }
  .rep .body { border-top:1px solid var(--line); padding:16px; font-size:13.5px; line-height:1.85; }
  .rep .body h2 { font-size:15px; margin:14px 0 7px; color:var(--accent2); }
  .rep .body h2:first-child { margin-top:0; }
  .rep .body h1 { display:none; }
  .rep .body ul, .rep .body ol { padding-left:20px; margin:5px 0 10px; }
  .rep .body li { margin-bottom:4px; }
  .rep .body strong { color:var(--accent2); }
  .rep .body hr { border:none; border-top:1px dashed var(--line); margin:14px 0; }
  .rep .body em { color:var(--sub); font-size:12px; font-style:normal; }
  .empty { color:var(--sub); font-size:12.5px; text-align:center; padding:30px 10px; line-height:1.8; }
  footer { text-align:center; color:var(--sub); font-size:10.5px; margin-top:24px; line-height:1.8; }

  /* Apple統一テーマ: ガラス質感 */
  .rep {
    -webkit-backdrop-filter:blur(14px) saturate(160%); backdrop-filter:blur(14px) saturate(160%);
    border-color:var(--glass-edge);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><a class="back" href="index.html">‹ ハブに戻る</a></div>
  <div class="ph">
    <span class="brand">Manager Report</span>
    <h1>📋 定例レポート</h1>
    <p>週報=毎週月曜9:30 ／ 月報=毎月1日に自動更新。過去分もここに残ります。</p>
  </div>

  <div class="tabs">
    <button data-f="all" class="on">すべて</button>
    <button data-f="weekly">週報</button>
    <button data-f="monthly">月報</button>
  </div>

  <div class="status" id="status">読み込み中…</div>
  <div id="list"></div>

  <footer>復号はこの端末内だけで行われます（ハブのパスコード）</footer>
</div>

<script>
(async () => {
  const st = document.getElementById("status");
  const list = document.getElementById("list");
  let all = [];

  function md(src) {
    const esc = s => s.replace(/[<>&]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));
    const inline = s => esc(s)
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>");
    const lines = src.split("\n");
    let html = "", inList = false;
    for (const ln of lines) {
      if (/^\s*[-*]\s+/.test(ln)) {
        if (!inList) { html += "<ul>"; inList = true; }
        html += "<li>" + inline(ln.replace(/^\s*[-*]\s+/, "")) + "</li>";
        continue;
      }
      if (/^\s*\d+\.\s+/.test(ln)) {
        if (!inList) { html += "<ol>"; inList = "ol"; }
        html += "<li>" + inline(ln.replace(/^\s*\d+\.\s+/, "")) + "</li>";
        continue;
      }
      if (inList) { html += inList === "ol" ? "</ol>" : "</ul>"; inList = false; }
      if (/^---+\s*$/.test(ln)) { html += "<hr>"; continue; }
      const h = ln.match(/^(#{1,3})\s+(.*)/);
      if (h) { html += "<h" + Math.max(2, h[1].length) + ">" + inline(h[2]) + "</h" + Math.max(2, h[1].length) + ">"; continue; }
      if (ln.trim()) html += "<p>" + inline(ln) + "</p>";
    }
    if (inList) html += inList === "ol" ? "</ol>" : "</ul>";
    return html;
  }

  function render(filter) {
    const rows = all.filter(r => filter === "all" || r.type === filter);
    if (!rows.length) { list.innerHTML = '<div class="empty">まだレポートがありません。<br>月曜9:30の週報をお楽しみに 📮</div>'; return; }
    list.innerHTML = rows.map((r, i) =>
      '<details class="rep"' + (i === 0 ? ' open' : '') + '>'
      + '<summary><span class="tag ' + r.type + '">' + (r.type === "weekly" ? "週報" : "月報") + '</span>'
      + '<span class="rt">' + r.title.replace(/[<>&]/g, "") + '</span>'
      + '<span class="rd">' + r.date + '</span><span class="arrow">▶</span></summary>'
      + '<div class="body">' + md(r.body) + '</div></details>'
    ).join("");
  }

  document.querySelectorAll(".tabs button").forEach(b => b.addEventListener("click", () => {
    document.querySelectorAll(".tabs button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    render(b.dataset.f);
  }));

  try {
    const r = await fetch("reports.enc.json?r=" + Date.now());
    if (!r.ok) throw new Error("レポートファイルが見つかりません");
    const enc = await r.json();
    const pass = localStorage.getItem("hub-pass");
    if (!pass) { st.textContent = "🔒 ハブのトップで一度パスコードを入れると表示されます"; return; }
    const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
    const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: b64(enc.salt), iterations: enc.iter, hash: "SHA-256" },
      km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64(enc.iv) }, key, b64(enc.ct));
    const data = JSON.parse(new TextDecoder().decode(pt));
    all = data.reports || [];
    st.textContent = "最終更新: " + (data.updated || "-") + "（" + all.length + "件）";
    render("all");
  } catch (e) {
    st.textContent = "読み込めませんでした（" + e.message + "）";
  }
})();
</script>
</body>
</html>
